version: "3.8"

services:
  server_minecraft:
    image: itzg/minecraft-server:latest
    container_name: "server_minecraft_neoforge"
    ports:
    - 25565:25565
    environment:
      EULA: "TRUE"
      TYPE: NEOFORGE
      VERSION: 1.21.1
      NEOFORGE_VERSION: 21.1.227
      ENABLE_ROLLING_LOGS: "true"
      DEBUG: "true"
      TZ: "Europe/Paris"
      DIFFICULTY: "normal"
      MAX_PLAYERS: 5
      SERVER_NAME: "Nazarick-Kingdom"
      VIEW_DISTANCE: "32"
      INIT_MEMORY: "4G"
      MAX_MEMORY: "8G"
    volumes:
    - ./data:/data
    - ./mods:/mods:ro
